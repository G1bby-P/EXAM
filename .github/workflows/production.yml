name: Production CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "11.0.7"
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Validate ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            path: backend
            prisma: true
            build_env: ""
          - name: admin
            path: admin
            prisma: false
            build_env: NEXT_PUBLIC_API_BASE_URL=/api/v1
          - name: student
            path: alumno
            prisma: false
            build_env: NEXT_PUBLIC_API_BASE_URL=/api/v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ matrix.path }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        if: matrix.prisma == true
        working-directory: ${{ matrix.path }}
        env:
          DATABASE_URL: postgresql://replace-with-user:replace-with-password@localhost:5432/exam_platform?schema=public
        run: pnpm prisma:generate

      - name: Typecheck
        working-directory: ${{ matrix.path }}
        run: pnpm typecheck

      - name: Test API
        if: matrix.name == 'api'
        working-directory: ${{ matrix.path }}
        run: pnpm test

      - name: Build
        working-directory: ${{ matrix.path }}
        run: ${{ matrix.build_env }} pnpm build

  docker:
    name: Build image ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: backend
            target: runner
            build_args: ""
          - image: api-migrate
            context: backend
            target: builder
            build_args: ""
          - image: admin
            context: admin
            target: runner
            build_args: NEXT_PUBLIC_API_BASE_URL=/api/v1
          - image: student
            context: alumno
            target: runner
            build_args: NEXT_PUBLIC_API_BASE_URL=/api/v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/exam-platform-${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          target: ${{ matrix.target }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


