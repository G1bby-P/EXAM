name: exam-platform

x-logging: &default-logging
  driver: json-file
  options:
    max-size: ${LOG_MAX_SIZE:-10m}
    max-file: ${LOG_MAX_FILE:-5}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks:
      - exam_platform

  postgres-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGHOST: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        mkdir -p /backups/postgres
        while true; do
          timestamp="$$(date -u +%Y%m%dT%H%M%SZ)"
          pg_dump -U "$$POSTGRES_USER" "$$POSTGRES_DB" | gzip > "/backups/postgres/exam-platform-$$timestamp.sql.gz"
          find /backups/postgres -type f -name 'exam-platform-*.sql.gz' -mtime +"$$BACKUP_RETENTION_DAYS" -delete
          sleep "$$BACKUP_INTERVAL_SECONDS"
        done
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging
    networks:
      - exam_platform

  api-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    restart: "no"
    command: ["pnpm", "db:migrate"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging
    networks:
      - exam_platform

  api-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    restart: "no"
    profiles:
      - seed
    command: ["pnpm", "db:seed"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD is required}
      SEED_TEST_ADMIN_PASSWORD: ${SEED_TEST_ADMIN_PASSWORD:?SEED_TEST_ADMIN_PASSWORD is required}
      SEED_TEST_STUDENT_PASSWORD: ${SEED_TEST_STUDENT_PASSWORD:?SEED_TEST_STUDENT_PASSWORD is required}
    depends_on:
      api-migrate:
        condition: service_completed_successfully
    logging: *default-logging
    networks:
      - exam_platform

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: ${API_PREFIX:-api/v1}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN_DAYS: ${JWT_REFRESH_EXPIRES_IN_DAYS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      TRUST_PROXY: "true"
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      SWAGGER_PATH: ${SWAGGER_PATH:-docs}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      FILE_STORAGE_PATH: /app/storage
    volumes:
      - app_storage:/app/storage
    depends_on:
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const p=process.env.API_PREFIX||'api/v1'; fetch('http://127.0.0.1:3000/'+p+'/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks:
      - exam_platform

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks:
      - exam_platform

  student:
    build:
      context: ./alumno
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks:
      - exam_platform

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      ADMIN_HOST: ${ADMIN_HOST:?ADMIN_HOST is required}
      STUDENT_HOST: ${STUDENT_HOST:?STUDENT_HOST is required}
      API_HOST: ${API_HOST:?API_HOST is required}
      CERT_NAME: ${CERT_NAME:?CERT_NAME is required}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-20m}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - letsencrypt_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      admin:
        condition: service_healthy
      student:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks:
      - exam_platform

  certbot:
    image: certbot/certbot:v2.11.0
    profiles:
      - certbot
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    logging: *default-logging

volumes:
  postgres_data:
  app_storage:
  letsencrypt_data:
  certbot_www:

networks:
  exam_platform:
    driver: bridge

